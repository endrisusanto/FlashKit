name: Code Quality
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev webkit2gtk-4.0-dev libayatana-appindicator3-dev

      - name: Rust Format Check
        run: cd bow-rust/src-tauri && cargo fmt -- --check

      - name: Rust Clippy (Linter)
        run: cd bow-rust/src-tauri && cargo clippy -- -D warnings

      - name: Install NPM Dependencies
        run: cd bow-rust && npm install

      - name: Frontend Type Check
        run: cd bow-rust && npm run build
