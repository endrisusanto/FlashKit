name: Security Audit
on:
  schedule:
    - cron: '0 0 * * 0' # Setiap Minggu
  push:
    paths:
      - '**/Cargo.lock'

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cd bow-rust/src-tauri && cargo audit
