name: Release FlashKit

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        working-directory: ./bow-rust
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./bow-rust
          tagName: ${{ github.ref_name }}
          releaseName: 'FlashKit ${{ github.ref_name }}'
          releaseBody: 'FlashKit Release ${{ github.ref_name }}. See README for usage instructions.'
          releaseDraft: true
          prerelease: false
          args: --bundles nsis
