name: Release FlashKit

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-22.04]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm libudev-dev

      - name: install frontend dependencies
        working-directory: ./bow-rust
        run: npm install

      - name: get commit message
        id: commit_msg
        shell: bash
        run: |
          msg=$(git log -1 --pretty=%B)
          echo "msg=$msg" >> $GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./bow-rust
          tagName: ${{ github.ref_name }}
          releaseName: 'FlashKit ${{ github.ref_name }}'
          releaseBody: '${{ steps.commit_msg.outputs.msg }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'windows-latest' && '--bundles nsis' || '--bundles deb,rpm' }}
