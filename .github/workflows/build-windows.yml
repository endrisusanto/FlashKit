name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        working-directory: ./bow-rust
        run: npm install

      - name: Build Tauri App
        working-directory: ./bow-rust
        run: npm run tauri build -- --bundles nsis

      - name: Copy portable files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "portable-build"
          Copy-Item "bow-rust/src-tauri/target/release/bow-rust.exe" "portable-build/"
          Copy-Item "extracted/Bow/WifiUtil.apk" "portable-build/"
          Copy-Item "extracted/Bow/Data_Saver_Test-debug.apk" "portable-build/"
          Copy-Item "extracted/Bow/Data_Saver_Test-debug-androidTest.apk" "portable-build/"
          Copy-Item "extracted/Bow/language.apk" "portable-build/"

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: BowDeviceManager-Windows-Portable
          path: portable-build/

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: BowDeviceManager-Windows-Installer
          path: bow-rust/src-tauri/target/release/bundle/nsis/
